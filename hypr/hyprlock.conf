
# Background
background {
    monitor =
    path = ~/Pictures/wallpapers/ruanmei2.jpeg
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 40
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = roboto
    placeholder_text = <i><span foreground="##C8B0AD">-</span></i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = #C8B0AD
    font_size = 120
    font_family = roboto
    position = 0, -300
    halign = center
    valign = top
}

# Welcome label
label {
    monitor =
    text = Omnia Vanitas
    color = #C8B0AD
    font_size = 25
    font_family = roboto
    position = 0, -40
    halign = center
    valign = center
}
